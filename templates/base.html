<!DOCTYPE html>
<html>
  <head>
    <title>{% block title %}How's Dan?{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class="layout">
      <nav class="sidebar">
        <a href="/" class="{{ 'active' if request.path == '/' }}">Home</a>
        <a href="/danspotting" class="{{ 'active' if request.path == '/danspotting' }}">Danspotting</a>
        <a href="/food" class="{{ 'active' if request.path == '/food' }}">Food</a>
      </nav>
      <main class="main">
        {% block content %}{% endblock %}
      </main>
    </div>
    {% block extra_js %}{% endblock %}

    <script>
      document.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", function(e) {
          const href = this.getAttribute("href");
          if (!href || href === "#" || href.startsWith("http")) return;
          e.preventDefault();
          const main = document.querySelector(".main");
          main.style.transition = "opacity 0.2s ease, transform 0.2s ease";
          main.style.opacity = "0";
          main.style.transform = "translateY(8px)";
          setTimeout(() => window.location.href = href, 200);
        });
      });
    </script>
  </body>
</html>
